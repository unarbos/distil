# Caddy reverse-proxy config for Distil SN97 (rewrite-v2 cutover).
#
# Cutover plan: the dashboard + chat go to "api-v2" first; once a full
# round has run cleanly, flip api.arbos.life to api-v2 and retire the
# legacy backend.
#
# Place under /etc/caddy/Caddyfile or include from the global config.

(common_security_headers) {
    header {
        Strict-Transport-Security "max-age=31536000; includeSubDomains; preload"
        X-Content-Type-Options "nosniff"
        Referrer-Policy "strict-origin-when-cross-origin"
        Permissions-Policy "interest-cohort=()"
    }
}

# ─── Live (legacy) API surface ───────────────────────────────────────────
# Kept on its own listener so we can run the new validator in parallel
# during the cutover round without touching what the dashboard/chat use.
api.arbos.life {
    import common_security_headers
    encode gzip zstd
    reverse_proxy 127.0.0.1:3700 {
        flush_interval -1
        header_up X-Real-IP {http.request.remote.host}
        header_up X-Forwarded-For {http.request.remote.host}
    }
}

# ─── New (rewrite-v2) API surface ────────────────────────────────────────
# After cutover, switch the upstream port on api.arbos.life and delete
# this block + the api-v2 DNS record.
api-v2.arbos.life {
    import common_security_headers
    encode gzip zstd
    reverse_proxy 127.0.0.1:3710 {
        flush_interval -1
        header_up X-Real-IP {http.request.remote.host}
        header_up X-Forwarded-For {http.request.remote.host}
    }
}

# ─── Dashboard (Next.js SSR) ─────────────────────────────────────────────
distil.arbos.life {
    import common_security_headers
    encode gzip zstd
    reverse_proxy 127.0.0.1:3000
}

# ─── Open-WebUI (chat UI) ────────────────────────────────────────────────
chat.arbos.life {
    import common_security_headers
    encode gzip
    reverse_proxy 127.0.0.1:8080 {
        # OWUI handles its own SSE buffering; defaults are fine.
    }
}
